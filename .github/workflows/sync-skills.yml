name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'claude-config/skills/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        repo:
          - cowork_CDIC
          # 新增更多 repo 在此
    steps:
      - uses: actions/checkout@v4

      - name: Sync skills to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.SKILLS_SYNC_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/coldjokenewbie-code/${{ matrix.repo }}.git /tmp/target
          mkdir -p /tmp/target/.claude/skills
          cp -r claude-config/skills/. /tmp/target/.claude/skills/
          echo "=== copied files ==="
          ls /tmp/target/.claude/skills/
          cd /tmp/target
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f .claude/skills
          echo "=== staged files ==="
          git diff --staged --name-only
          git diff --staged --quiet && echo "no changes" || (git commit -m "chore: sync skills from WTF_Under_Construction" && git push)
