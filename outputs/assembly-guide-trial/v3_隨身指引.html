<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>隨身指引版 — 組立工場導覽</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"PingFang TC","Noto Sans TC",sans-serif;background:#0a0e14;color:#fff;
 height:100svh;display:flex;flex-direction:column;padding:0 18px calc(16px + env(safe-area-inset-bottom))}
.top{display:flex;gap:10px;padding:16px 0 6px}
.tbtn{flex:1;background:#ffd23f;color:#0a0e14;border:none;border-radius:16px;padding:14px;font-size:20px;
 font-weight:900;min-height:56px}
.tbtn.alt{background:#fff}
h1{font-size:32px;line-height:1.3;font-weight:900;margin:14px 2px 4px}
.hint{color:#b9c4d0;font-size:18px;margin:0 2px 12px}
/* 雷達定位 */
.locate{position:relative;height:120px;display:flex;align-items:center;justify-content:center;margin:2px 0 14px}
.radar,.radar::before,.radar::after{content:"";position:absolute;border-radius:50%;
 border:2px solid rgba(255,210,63,.6)}
.radar{width:70px;height:70px;background:#ffd23f;border:none;display:flex;align-items:center;justify-content:center;
 font-size:30px;z-index:2;color:#0a0e14}
.ring{position:absolute;width:70px;height:70px;border-radius:50%;border:3px solid #ffd23f;
 animation:pulse 2.4s ease-out infinite}
.ring:nth-child(2){animation-delay:.8s}.ring:nth-child(3){animation-delay:1.6s}
@keyframes pulse{0%{transform:scale(1);opacity:.9}100%{transform:scale(3.2);opacity:0}}
.locate .me{position:absolute;bottom:2px;color:#ffd23f;font-size:16px;font-weight:800}
/* 兩張大卡 */
.big2{display:flex;flex-direction:column;gap:14px;flex:1}
.bcard{border-radius:22px;padding:22px;display:flex;align-items:center;gap:18px;min-height:104px;
 border:3px solid transparent}
.bcard .em{font-size:46px;flex:0 0 auto}
.bcard h2{font-size:26px;font-weight:900}.bcard p{font-size:18px;margin-top:4px}
.audio{background:#ffd23f;color:#0a0e14}
.audio p{color:#5a4a00}
.acc{background:#1e6feb;color:#fff}
.acc p{color:#cfe0ff}
.audio .em{animation:beat 1.6s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
/* 快速需求 大字 */
.needs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.need{background:#141b26;border:2px solid #263241;border-radius:16px;padding:16px;font-size:20px;
 font-weight:800;display:flex;align-items:center;gap:10px;min-height:60px}
</style></head><body>
  <div class="top">
    <button class="tbtn">Ａ⁺ 放大字</button>
    <button class="tbtn alt">🌐 English</button>
  </div>

  <h1>需要我帶你<br>去哪裡？</h1>
  <p class="hint">點大按鈕就好・會用聲音和震動帶你走</p>

  <div class="locate">
    <span class="ring"></span><span class="ring"></span><span class="ring"></span>
    <div class="radar">📍</div>
    <div class="me">你在這・蒸汽機廣場</div>
  </div>

  <div class="big2">
    <button class="bcard audio"><span class="em">🔊</span>
      <div><h2>聽老職工帶路</h2><p>戴耳機・空出雙手，一路講給你聽</p></div></button>
    <button class="bcard acc"><span class="em">♿</span>
      <div><h2>無障礙路線</h2><p>避階梯走電梯・標休息點與廁所</p></div></button>
  </div>

  <div class="needs">
    <div class="need">🚻 最近廁所</div>
    <div class="need">🪑 休息區</div>
    <div class="need">🦽 借輪椅</div>
    <div class="need">🚪 最近出口</div>
  </div>
</body></html>
