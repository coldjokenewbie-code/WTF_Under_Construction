<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>組立工場導覽 — 時間儀表版（Lead: Codex）</title>
<style>
:root{--coal:#16130e;--coal2:#1e1a13;--paper:#ece4d3;--mut:#9b8f79;--copper:#b9793a;--ink:#f2ebdb;
 --serif:"Songti SC","STSong","Noto Serif TC",Georgia,serif;--mono:ui-monospace,"SF Mono",Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"PingFang TC","Noto Sans TC",sans-serif;background:var(--coal);color:var(--ink);
 height:100svh;display:flex;flex-direction:column;overflow:hidden}
.top{display:flex;align-items:baseline;gap:10px;padding:calc(16px + env(safe-area-inset-top)) 20px 10px}
.top .mk{font-family:var(--serif);font-size:15px;letter-spacing:5px}
.top .no{font-family:var(--mono);font-size:11px;color:var(--mut);letter-spacing:1px;margin-left:auto}
/* Hero：窗景照片 + 左側時間軸 */
.hero{position:relative;height:46svh;margin:0 20px;display:flex;gap:0}
.axis{width:58px;flex:0 0 58px;border-left:1px solid #3a3225;border-right:1px solid #3a3225;
 background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.35));position:relative;overflow:hidden}
.axis .scan{position:absolute;left:0;right:0;height:1px;background:var(--copper);opacity:.7;
 animation:scan 5s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}
.tk{position:absolute;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:1px}
.tk b{font-family:var(--mono);font-size:12px;color:var(--mut)}
.tk i{width:8px;height:1px;background:#5a4f3c;display:block;margin-top:3px}
.tk.on b{color:var(--copper);font-weight:700}.tk.on::before{content:"";position:absolute;left:-1px;
 top:-4px;bottom:-4px;width:2px;background:var(--copper)}
.photo{flex:1;position:relative;overflow:hidden;border:1px solid #3a3225;border-left:none}
.photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:56% 42%;
 filter:sepia(.15) contrast(1.05);animation:kb 24s ease-in-out infinite alternate}
@keyframes kb{from{transform:scale(1.03)}to{transform:scale(1.1)}}
.photo .cap{position:absolute;left:10px;bottom:9px;font-family:var(--mono);font-size:9px;color:#d8cdb6;
 background:rgba(0,0,0,.4);padding:3px 7px;border-radius:4px;letter-spacing:.5px}
/* 儀表 */
.dash{padding:18px 20px 6px}
.dash .eyebrow{font-size:11px;letter-spacing:3px;color:var(--copper);text-transform:uppercase}
.dash h1{font-family:var(--serif);font-size:26px;font-weight:600;line-height:1.35;letter-spacing:1px;margin:8px 0 2px}
.dash h1 time{font-family:var(--mono);color:var(--paper);font-size:30px;letter-spacing:1px}
.rows{margin-top:12px;border-top:1px solid #2e281d}
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #2e281d}
.row .k{font-family:var(--mono);font-size:12px;color:var(--copper);width:52px;flex:0 0 52px}
.row .m b{font-size:15px}.row .m span{display:block;font-size:12px;color:var(--mut);margin-top:1px}
.row .a{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--mut)}
/* 底部固定動作 */
.dock{margin-top:auto;padding:12px 20px calc(16px + env(safe-area-inset-bottom))}
.play{width:100%;display:flex;align-items:center;gap:14px;border:none;border-radius:15px;
 padding:15px 18px;background:linear-gradient(180deg,#c98544,#a9713b);color:#20140a;cursor:pointer}
.play .ic{width:38px;height:38px;flex:0 0 38px;border-radius:50%;background:rgba(32,20,10,.16);
 display:flex;align-items:center;justify-content:center}
.play .ic svg{width:18px;height:18px;margin-left:2px}
.play .t{text-align:left}.play .t b{font-size:16px;display:block;font-weight:700}
.play .t span{font-size:12px;opacity:.75}
</style></head><body>
<svg width="0" height="0" style="position:absolute"><defs>
 <symbol id="i-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></symbol></defs></svg>

<div class="top"><span class="mk">組立工場</span><span class="no">DENNIS COLL · No.7090</span></div>

<div class="hero">
  <div class="axis">
    <div class="scan"></div>
    <div class="tk" style="top:12%"><b>10:00</b></div>
    <div class="tk" style="top:38%"><b>11:30</b></div>
    <div class="tk" style="top:64%"><b>13:00</b></div>
    <div class="tk on" style="top:86%"><b>14:30</b></div>
  </div>
  <div class="photo">
    <img src="assets/erecting_shop_crop.jpg" alt="1900年代火車頭組立工場內部">
    <span class="cap">BALDWIN ERECTING SHOP · c.1905</span>
  </div>
</div>

<div class="dash">
  <div class="eyebrow">老職工帶路 · 今日排程</div>
  <h1>下一場真人導覽 <time>14:30</time></h1>
  <div class="rows">
    <div class="row"><span class="k">NOW</span><span class="m"><b>先聽 15 分鐘</b><span>剛好接上 14:30 那場</span></span><span class="a">音訊</span></div>
    <div class="row"><span class="k">40′</span><span class="m"><b>40 分鐘必看</b><span>蒸汽機廣場 · 車床區 · 鉚接工坊</span></span><span class="a">4 站</span></div>
    <div class="row"><span class="k">A11Y</span><span class="m"><b>無障礙路線</b><span>避階梯 · 標休息點與廁所</span></span><span class="a">切換</span></div>
  </div>
</div>

<div class="dock">
  <button class="play"><span class="ic"><svg><use href="#i-play"/></svg></span>
    <span class="t"><b>播放老職工導覽</b><span>字幕／逐字稿可用 · 06:30</span></span></button>
</div>
</body></html>
